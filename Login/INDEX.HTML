<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>

<meta name="theme-color" content="#020617">
</head>

<body>

<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<div class="form-container">
  <p class="title">Entrar</p>

  <form id="loginForm">

    <div class="input-group">
      <input type="email" id="username" required>
      <label>Email</label>
    </div>

    <div class="input-group">
      <input type="password" id="password" required>
      <label>Senha</label>
    </div>

    <button class="sign" type="submit">Entrar</button>

    <label class="remember">
      <input type="checkbox" id="remember">
      <span class="checkmark"></span>
      <span>Lembrar login</span>
    </label>

    <div class="divider">
      <span>Continuar com</span>
    </div>

    <div class="social-icons">

      <button class="icon" type="button" onclick="socialLogin('Google')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/IOS_Google_icon.png">
      </button>

      <button class="icon" type="button" onclick="socialLogin('Facebook')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg">
      </button>

      <button class="icon" type="button" onclick="socialLogin('GitHub')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Octicons-mark-github.svg">
      </button>

    </div>

    <p class="signup">
      Não tem conta? <a href="cadastro.html">Cadastrar-se</a>
    </p>

  </form>
</div>

</body>
</html>
