<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth</title>

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>

<meta name="theme-color" content="#020617">
</head>

<body>

<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<div class="form-container">

  <div class="forms-wrapper">

    <!-- LOGIN -->
    <form id="loginForm" class="active">

      <p class="title">Entrar</p>

      <div class="input-group">
        <input type="email" id="loginEmail" required placeholder=" ">
        <label>Email</label>
      </div>

      <div class="input-group password-wrapper">
        <input type="password" id="loginPassword" required placeholder=" ">
        <label>Senha</label>
        <span class="eye" onclick="togglePassword('loginPassword')">👁</span>
      </div>

      <button class="sign" type="submit">Entrar</button>

      <p class="signup">
        Não tem conta? <a href="#" onclick="showForm('register')">Cadastrar-se</a>
      </p>

    </form>

    <!-- CADASTRO -->
    <form id="registerForm">

      <p class="title">Criar conta</p>

      <div class="input-group">
        <input type="text" id="name" required placeholder=" ">
        <label>Nome</label>
      </div>

      <div class="input-group">
        <input type="email" id="email" required placeholder=" ">
        <label>Email</label>
      </div>

      <div class="input-group password-wrapper">
        <input type="password" id="password" required placeholder=" ">
        <label>Senha</label>
        <span class="eye" onclick="togglePassword('password')">👁</span>
      </div>

      <div class="input-group password-wrapper">
        <input type="password" id="confirmPassword" required placeholder=" ">
        <label>Confirmar senha</label>
        <span class="eye" onclick="togglePassword('confirmPassword')">👁</span>
      </div>

      <button class="sign" type="submit">Cadastrar</button>

      <p class="signup">
        Já tem conta? <a href="#" onclick="showForm('login')">Entrar</a>
      </p>

    </form>

  </div>
</div>

</body>
</html>
